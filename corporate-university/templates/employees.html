<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_name }} - Сотрудники</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e4e4e4;
            min-height: 100vh;
        }
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .navbar h1 { color: #00d4ff; font-size: 1.5rem; }
        .nav-links a {
            color: #8892a8;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: #00d4ff; }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        .section-title { font-size: 1.5rem; margin-bottom: 1.5rem; color: #fff; }
        .employees-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .employee-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s;
            text-align: center;
        }
        .employee-card:hover {
            border-color: #00d4ff;
            transform: translateY(-5px);
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00d4ff, #10b981);
            margin: 0 auto 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #fff;
        }
        .employee-name { font-size: 1.1rem; color: #fff; margin-bottom: 0.5rem; }
        .employee-position { color: #8892a8; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .employee-dept { 
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0,212,255,0.1);
            color: #00d4ff;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            color: #e4e4e4;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.85rem;
            transition: all 0.3s;
            margin-top: 1rem;
        }
        .btn:hover { background: rgba(0,212,255,0.2); color: #00d4ff; }
        .search-bar {
            width: 100%;
            max-width: 400px;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #e4e4e4;
            margin-bottom: 2rem;
        }
        .search-bar:focus { outline: none; border-color: #00d4ff; }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>🎓 {{ app_name }}</h1>
        <div class="nav-links">
            <a href="/">Главная</a>
            <a href="/courses">Курсы</a>
            <a href="/employees">Сотрудники</a>
            <a href="/statistics">Статистика</a>
            <a href="/webinars">Вебинары</a>
        </div>
    </nav>

    <div class="container">
        <h2 class="section-title">👥 Сотрудники компании</h2>
        
        <input type="text" class="search-bar" placeholder="🔍 Поиск сотрудника...">

        <div class="employees-grid">
            {% for user in users %}
            <div class="employee-card">
                <div class="avatar">{{ user.name[0] if user.name else '?' }}</div>
                <h3 class="employee-name">{{ user.name }}</h3>
                <p class="employee-position">{{ user.position }}</p>
                <span class="employee-dept">{{ user.department }}</span>
                <br>
                <a href="/employee/{{ user.id }}" class="btn">Профиль обучения</a>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
